# Render deployment configuration for Seeking
# Documentation: https://render.com/docs/deploy-flask

services:
  - type: web
    name: seeking-app
    env: python
    region: singapore  # Options: oregon, frankfurt, singapore
    plan: free

    # Build command
    buildCommand: |
      pip install -r backend/requirements.txt
      chmod +x start.sh
      # Ensure Unix line endings
      sed -i 's/\r$//' start.sh 2>/dev/null || true

    # Start command
    startCommand: /bin/bash start.sh

    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production

    # Health check
    healthCheckPath: /
    initialDelaySeconds: 30

    # Auto-deploy
    autoDeploy: true

